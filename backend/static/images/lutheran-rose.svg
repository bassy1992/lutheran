<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <!-- Outer gold ring -->
  <circle cx="100" cy="100" r="95" fill="#FFD700" stroke="#000" stroke-width="2"/>
  
  <!-- Blue ring -->
  <circle cx="100" cy="100" r="85" fill="#4169E1" stroke="#000" stroke-width="2"/>
  
  <!-- White rose petals -->
  <g fill="#FFFFFF" stroke="#000" stroke-width="1.5">
    <!-- Top petal -->
    <ellipse cx="100" cy="50" rx="25" ry="35" transform="rotate(0 100 100)"/>
    <!-- Top-right petal -->
    <ellipse cx="135" cy="65" rx="25" ry="35" transform="rotate(72 100 100)"/>
    <!-- Bottom-right petal -->
    <ellipse cx="120" cy="120" rx="25" ry="35" transform="rotate(144 100 100)"/>
    <!-- Bottom-left petal -->
    <ellipse cx="80" cy="120" rx="25" ry="35" transform="rotate(216 100 100)"/>
    <!-- Top-left petal -->
    <ellipse cx="65" cy="65" rx="25" ry="35" transform="rotate(288 100 100)"/>
  </g>
  
  <!-- Green sepals between petals -->
  <g fill="#228B22" stroke="#000" stroke-width="1">
    <ellipse cx="100" cy="35" rx="8" ry="20"/>
    <ellipse cx="145" cy="75" rx="8" ry="20" transform="rotate(72 100 100)"/>
    <ellipse cx="130" cy="135" rx="8" ry="20" transform="rotate(144 100 100)"/>
    <ellipse cx="70" cy="135" rx="8" ry="20" transform="rotate(216 100 100)"/>
    <ellipse cx="55" cy="75" rx="8" ry="20" transform="rotate(288 100 100)"/>
  </g>
  
  <!-- Red heart -->
  <path d="M 100 75 
           C 100 65, 90 60, 85 65
           C 80 70, 80 75, 80 80
           C 80 90, 100 105, 100 105
           C 100 105, 120 90, 120 80
           C 120 75, 120 70, 115 65
           C 110 60, 100 65, 100 75 Z" 
        fill="#DC143C" stroke="#000" stroke-width="1.5"/>
  
  <!-- Black cross -->
  <g fill="#000">
    <rect x="97" y="70" width="6" height="30"/>
    <rect x="88" y="82" width="24" height="6"/>
  </g>
  
  <!-- Radiating lines -->
  <g stroke="#000" stroke-width="0.8" opacity="0.6">
    <line x1="100" y1="45" x2="100" y2="25"/>
    <line x1="110" y1="47" x2="115" y2="30"/>
    <line x1="90" y1="47" x2="85" y2="30"/>
    <line x1="120" y1="52" x2="130" y2="38"/>
    <line x1="80" y1="52" x2="70" y2="38"/>
    <line x1="128" y1="60" x2="142" y2="50"/>
    <line x1="72" y1="60" x2="58" y2="50"/>
    <line x1="135" y1="70" x2="150" y2="65"/>
    <line x1="65" y1="70" x2="50" y2="65"/>
    <line x1="140" y1="82" x2="155" y2="82"/>
    <line x1="60" y1="82" x2="45" y2="82"/>
    <line x1="142" y1="95" x2="157" y2="100"/>
    <line x1="58" y1="95" x2="43" y2="100"/>
    <line x1="140" y1="108" x2="152" y2="118"/>
    <line x1="60" y1="108" x2="48" y2="118"/>
    <line x1="133" y1="120" x2="143" y2="133"/>
    <line x1="67" y1="120" x2="57" y2="133"/>
    <line x1="123" y1="130" x2="130" y2="145"/>
    <line x1="77" y1="130" x2="70" y2="145"/>
    <line x1="112" y1="137" x2="115" y2="153"/>
    <line x1="88" y1="137" x2="85" y2="153"/>
    <line x1="100" y1="140" x2="100" y2="155"/>
  </g>
</svg>
